<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>即時翻譯字幕</title>
</head>
<body>
  <h1>即時翻譯字幕</h1>
  <div id="output"></div>

  <script>
    const socket = new WebSocket("ws://localhost:8765");
    socket.onmessage = function(event) {
      const output = document.getElementById("output");
      const p = document.createElement("p");
      p.textContent = event.data;
      output.appendChild(p);
    };
  </script>
</body>
</html>
