<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>即時翻譯字幕</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    #output {
      height: 30vh; /* 視窗高度的 30% */
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
    }
    .subtitle-block {
      margin-bottom: 20px;
    }
    .original {
      text-align: center;
      color: #aaa; /* 原文灰白色 */
      font-size: 3vw; /* 字體大小隨視窗寬度調整 */
    }
    .translated {
      text-align: center;
      color: #fff; /* 翻譯純白色 */
      font-size: 4vw; /* 字體大小隨視窗寬度調整 */
      font-weight: bold;
    }
    #controls {
      margin-top: 15px;
      text-align: center;
    }
    button {
      background-color: #222;
      color: white;
      border: 1px solid #555;
      padding: 10px 20px;
      margin: 0 10px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #444;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      color: #f00; /* 初始狀態紅色 */
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;">即時翻譯字幕</h1>
  <div id="output"></div>
  <div id="controls">
    <button id="startBtn">開始翻譯</button>
    <button id="stopBtn">結束翻譯</button>
    <button id="clearBtn">清除字幕</button>
  </div>
  <div id="status">狀態：已停止</div>

  <script>
    let socket = null;

    function startTranslation() {
      if (socket && socket.readyState === WebSocket.OPEN) return;
      socket = new WebSocket("ws://localhost:8765");
      socket.onopen = function() {
        document.getElementById("status").textContent = "狀態：翻譯中";
        document.getElementById("status").style.color = "#0f0";
      };
      socket.onclose = function() {
        document.getElementById("status").textContent = "狀態：已停止";
        document.getElementById("status").style.color = "#f00";
      };
      socket.onmessage = function(event) {
        const output = document.getElementById("output");
        const [original, translated] = event.data.split("|");

        const block = document.createElement("div");
        block.className = "subtitle-block";

        const origDiv = document.createElement("div");
        origDiv.className = "original";
        origDiv.textContent = original;

        const transDiv = document.createElement("div");
        transDiv.className = "translated";
        transDiv.textContent = translated;

        block.appendChild(origDiv);
        block.appendChild(transDiv);
        output.appendChild(block);

        // 保持最多顯示兩組字幕
        const blocks = output.getElementsByClassName("subtitle-block");
        if (blocks.length > 2) {
          output.removeChild(blocks[0]);
        }

        // 自動捲到最新字幕
        output.scrollTop = output.scrollHeight;
      };
    }

    function stopTranslation() {
      if (socket) {
        socket.close();
        socket = null;
      }
    }

    function clearSubtitles() {
      const output = document.getElementById("output");
      output.innerHTML = "";
    }

    document.getElementById("startBtn").addEventListener("click", startTranslation);
    document.getElementById("stopBtn").addEventListener("click", stopTranslation);
    document.getElementById("clearBtn").addEventListener("click", clearSubtitles);
  </script>
</body>
</html>
